version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: find-app-web
    restart: unless-stopped
    ports:
      - "3008:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://find_user:FindStrongPass123!@db:5432/find_db?schema=public
      - NEXTAUTH_SECRET=super_secret_find_app_key_123!
      - AUTH_SECRET=super_secret_find_app_key_123!
      - AUTH_URL=http://find.aptimio.com
      - NEXTAUTH_URL=https://find.aptimio.com
    networks:
      - webnet
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    container_name: find-app-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: find_user
      POSTGRES_PASSWORD: FindStrongPass123!
      POSTGRES_DB: find_db
    ports:
      - "5435:5432"
    volumes:
      - find_pgdata:/var/lib/postgresql/data
    networks:
      - webnet

networks:
  webnet:
    driver: bridge

volumes:
  find_pgdata:
